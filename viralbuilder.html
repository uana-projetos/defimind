    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #141520; }
    ::-webkit-scrollbar-thumb { background: #252840; border-radius: 4px; }
    textarea, input, select { outline: none; font-family: inherit; }
    button { cursor: pointer; font-family: inherit; }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade { animation: fadeIn 0.3s ease both; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

// ── Paleta ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#0a0b0f", card:"#141520", card2:"#1a1d2e", card3:"#1f2235",
  accent:"#ff2d55", cyan:"#00f2ea", gold:"#ffd700",
  green:"#22c55e", purple:"#a855f7", orange:"#f97316",
  text:"#f0f2f8", muted:"#8892a4", border:"#252840"
};

// ── Prompt base ───────────────────────────────────────────────────────────────
const SYS = `Você é um especialista em TikTok Shop e marketing viral com anos de experiência.
Domina hooks de 3 segundos, psicologia de conversão, ângulos virais e GMV.
Responde sempre em português brasileiro. Tom: direto, prático, coloquial, sem enrolação.
Conhece os padrões que fazem vídeos explodirem: prova social, urgência, transformação, curiosidade, autoridade.`;

// ── Utilitários ───────────────────────────────────────────────────────────────
const copy = t => navigator.clipboard?.writeText(t).catch(() => {});
const tryParseJSON = (text, fallback = null) => {
  try {
    const c = text.replace(/```json|```/g, "").trim();
    const s = c.indexOf("[") !== -1 && (c.indexOf("[") < c.indexOf("{") || c.indexOf("{") === -1) ? "[" : "{";
    const e = s === "[" ? "]" : "}";
    return JSON.parse(c.slice(c.indexOf(s), c.lastIndexOf(e) + 1));
  } catch { return fallback; }
};

// ── Componentes base ─────────────────────────────────────────────────────────
const Btn = ({ onClick, disabled, loading: ld, children, style={}, variant="primary" }) => {
  const variants = {
    primary:{ background:`linear-gradient(135deg,${C.accent},#ff6b85)`, color:"#fff" },
    cyan:{ background:`linear-gradient(135deg,${C.cyan},#00c4be)`, color:"#000" },
    ghost:{ background:C.card3, color:C.text, border:`1px solid ${C.border}` },
    gold:{ background:`linear-gradient(135deg,${C.gold},#ffb700)`, color:"#000" },
    purple:{ background:`linear-gradient(135deg,${C.purple},#7c3aed)`, color:"#fff" },
  };
  return (
    <button onClick={disabled||ld?undefined:onClick}
      style={{ display:"flex",alignItems:"center",justifyContent:"center",gap:6,
        padding:"11px 16px",borderRadius:10,border:"none",fontWeight:700,fontSize:14,
        width:"100%",opacity:disabled||ld?0.55:1,cursor:disabled||ld?"not-allowed":"pointer",
        transition:"all 0.15s",...variants[variant],...style }}>
      {ld ? <span className="spin">⟳</span> : children}
    </button>
  );
};

const Card = ({ children, style={}, onClick }) => (
  <div onClick={onClick} style={{ background:C.card,borderRadius:12,padding:16,
    border:`1px solid ${C.border}`,cursor:onClick?"pointer":"default",...style }}>
    {children}
  </div>
);

const Inp = ({ label, value, onChange, placeholder, multi, rows=3, type="text" }) => (
  <div style={{ marginBottom:12 }}>
    {label && <div style={{ fontSize:12,color:C.muted,marginBottom:5,fontWeight:500 }}>{label}</div>}
    {multi
      ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
          style={{ width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,
            padding:"10px 12px",color:C.text,fontSize:14,resize:"vertical",lineHeight:1.6 }}/>
      : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
          style={{ width:"100%",background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,
            padding:"10px 12px",color:C.text,fontSize:14 }}/>
    }
  </div>
);

const Tag = ({ children, color=C.accent }) => (
  <span style={{ background:color+"22",color,fontSize:11,fontWeight:600,
    padding:"3px 8px",borderRadius:20,border:`1px solid ${color}44`,whiteSpace:"nowrap" }}>
    {children}
  </span>
);

const ScoreBar = ({ label, value, color=C.accent, feedback }) => (
  <div style={{ marginBottom:12 }}>
    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
      <span style={{ fontSize:13 }}>{label}</span>
      <span style={{ fontWeight:700,color,fontSize:13 }}>{value}/10</span>
    </div>
    <div style={{ background:C.card3,borderRadius:4,height:7 }}>
      <div style={{ background:color,height:7,borderRadius:4,width:`${Math.min(value*10,100)}%`,transition:"width 0.6s ease" }}/>
    </div>
    {feedback && <div style={{ fontSize:11,color:C.muted,marginTop:4 }}>{feedback}</div>}
  </div>
);

const CopyBtn = ({ text, style={} }) => {
  const [ok, setOk] = useState(false);
  const doCopy = () => { copy(text); setOk(true); setTimeout(()=>setOk(false),1500); };
  return (
    <button onClick={doCopy} style={{ background:"none",border:`1px solid ${C.border}`,color:ok?C.green:C.muted,
      borderRadius:8,padding:"6px 12px",fontSize:12,width:"100%",fontWeight:ok?600:400,...style }}>
      {ok ? "✓ Copiado!" : "📋 Copiar"}
    </button>
  );
};

// ── useClaude hook ────────────────────────────────────────────────────────────
const useClaude = (claudeKey, setErr) => useCallback(async (prompt, sys=SYS, maxTokens=1500, useSearch=false) => {
  if (!claudeKey) { setErr("⚙️ Configure sua API Key Claude nas Configurações"); return null; }
  try {
    const body = { model:"claude-sonnet-4-6", max_tokens:maxTokens, system:sys,
      messages:[{role:"user",content:prompt}] };
    if (useSearch) body.tools = [{type:"web_search_20250305",name:"web_search"}];
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{ "Content-Type":"application/json","x-api-key":claudeKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
      body:JSON.stringify(body)
    });
    if (!res.ok) { const e=await res.json(); setErr(e.error?.message||"Erro API Claude"); return null; }
    const data = await res.json();
    return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"";
  } catch(e) { setErr("Erro de conexão: "+e.message); return null; }
}, [claudeKey, setErr]);

// VIRAL FINDER
// ══════════════════════════════════════════════════════════════════════════════
const ViralFinder = ({ callClaude, setErr }) => {
  const [produto, setProduto] = useState("");
  const [nicho, setNicho] = useState("geral");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  const nichos = [

    {id:"moda",label:"👗 Moda"},{id:"saude",label:"💪 Saúde"},
    {id:"casa",label:"🏠 Casa"},{id:"pet",label:"🐾 Pet"},
    {id:"tech",label:"📱 Tech"},{id:"food",label:"🍕 Food"},
  ];

  const buscar = async () => {
    if (!produto.trim()) { setErr("Digite o produto ou nicho"); return; }
    setLoading(true); setResults([]);
    const prompt = `Pesquise na internet os vídeos mais virais do TikTok Shop sobre "${produto}" no nicho "${nicho}" em 2025/2026.

Para cada vídeo, retorne APENAS um JSON válido (array):
[
  {
    "titulo": "descrição do vídeo",
    "criador": "tipo do creator (ex: nano-influencer, everyday user, expert)",
    "hook": "os primeiros 3 segundos exatos — o texto falado",
    "angulo": "ângulo principal (Transformação|Prova Social|Dor|Curiosidade|Autoridade|Urgência)",
    "porque_viral": "1 frase explicando o que fez explodir",
    "gmv_potencial": "alto|médio|baixo",
    "insights": "1 insight prático e replicável"
  }
]

Retorne APENAS o array JSON, sem markdown, sem texto fora.`;
    const res = await callClaude(prompt, SYS, 2000, true);
    if (res) {
      const parsed = tryParseJSON(res, []);
      if (parsed?.length) setResults(parsed);
      else setErr("Sem resultados. Tente um produto diferente.");
    }
    setLoading(false);
  };

  const gmvC = { alto:C.green, médio:C.gold, baixo:C.muted };
  const angC = { Transformação:C.purple,"Prova Social":C.cyan,Dor:C.accent,Curiosidade:C.orange,Autoridade:C.gold,Urgência:C.accent };

  return (
    <div className="fade">
      <h2 style={{ fontSize:18,fontWeight:800,marginBottom:3 }}>🔥 Viral Finder</h2>
      <p style={{ color:C.muted,fontSize:13,marginBottom:16 }}>Descobre vídeos explodindo agora no TikTok Shop</p>
      <Card style={{ marginBottom:12 }}>
        <Inp label="Produto ou palavra-chave" value={produto} onChange={setProduto}

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:12,color:C.muted,marginBottom:7,fontWeight:500 }}>Nicho</div>

          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10 }}>
            <div style={{ flex:1,paddingRight:8 }}>
              <div style={{ fontWeight:600,fontSize:14,marginBottom:3 }}>{v.titulo}</div>
              <div style={{ fontSize:12,color:C.muted }}>{v.criador}</div>
            </div>
            <Tag color={gmvC[v.gmv_potencial]||C.muted}>GMV {v.gmv_potencial}</Tag>
          </div>
          <div style={{ background:C.card2,borderRadius:8,padding:10,marginBottom:10,borderLeft:`3px solid ${C.accent}` }}>

          </div>
          <div style={{ fontSize:13,color:C.text,marginBottom:10,lineHeight:1.6 }}>
            <span style={{ color:C.cyan,fontWeight:600 }}>Por que viralizou: </span>{v.porque_viral}

          <div style={{ background:C.card3,borderRadius:8,padding:10,fontSize:12,lineHeight:1.5,borderLeft:`3px solid ${C.green}` }}>

// HOOK DECODER
// ══════════════════════════════════════════════════════════════════════════════
const HookDecoder = ({ callClaude, setErr }) => {
  const [hook, setHook] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const decodificar = async () => {
    if (!hook.trim()) { setErr("Cole o hook para analisar"); return; }
    setLoading(true); setResult(null);
    const prompt = `Analise este hook de TikTok e retorne APENAS JSON:

Hook: "${hook}"

{
  "tipo": "tipo do hook (Identidade|Curiosidade|Contrarian|Open Loop|Confissão|Transformação|Urgência|Prova Social)",
  "gatilho": "gatilho psicológico principal",
  "porque_funciona": "análise em 2 frases do que faz funcionar",
  "pontos_fortes": ["ponto 1", "ponto 2"],
  "pontos_fracos": ["fraqueza se houver, senão array vazio"],
  "score": número de 1 a 10,
  "variacoes": [
    {"texto": "variação 1 melhorada", "melhoria": "o que mudou"},
    {"texto": "variação 2 ângulo diferente", "melhoria": "o que mudou"},
    {"texto": "variação 3 mais agressiva", "melhoria": "o que mudou"}
  ]
}

Apenas o JSON.`;
    const res = await callClaude(prompt, SYS, 1500);
    if (res) {
      const parsed = tryParseJSON(res);
      if (parsed) setResult(parsed);
      else setErr("Erro ao processar. Tente novamente.");
    }
    setLoading(false);
  };

  const sColor = s => s>=8?C.green:s>=6?C.gold:C.accent;

  return (
    <div className="fade">
      <h2 style={{ fontSize:18,fontWeight:800,marginBottom:3 }}>🔓 Hook Decoder</h2>
      <p style={{ color:C.muted,fontSize:13,marginBottom:16 }}>Decifra o que faz um hook explodir no TikTok</p>
      <Card style={{ marginBottom:12 }}>
        <Inp label="Cole o hook aqui" value={hook} onChange={setHook}
          placeholder="Ex: 'Esse produto destruiu minha pele antes de salvar ela...'" multi rows={3}/>
        <Btn onClick={decodificar} loading={loading} variant="cyan">🔍 Decodificar</Btn>
      </Card>
      {result && (
        <div className="fade">
          <Card style={{ marginBottom:12 }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
              <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                <Tag color={C.purple}>{result.tipo}</Tag>
                <Tag color={C.cyan}>{result.gatilho}</Tag>
              </div>
              <div style={{ textAlign:"center",minWidth:50 }}>
                <div style={{ fontSize:30,fontWeight:900,color:sColor(result.score),lineHeight:1 }}>{result.score}</div>
                <div style={{ fontSize:10,color:C.muted }}>/ 10</div>
              </div>
            </div>
            <div style={{ fontSize:13,lineHeight:1.6,marginBottom:12 }}>{result.porque_funciona}</div>
            {result.pontos_fortes?.map((p,i)=>(
              <div key={i} style={{ display:"flex",gap:8,fontSize:13,marginBottom:5 }}>
                <span style={{ color:C.green }}>✓</span><span>{p}</span>
              </div>
            ))}
            {result.pontos_fracos?.filter(Boolean).map((p,i)=>(
              <div key={i} style={{ display:"flex",gap:8,fontSize:13,marginBottom:5,marginTop:4 }}>
                <span style={{ color:C.accent }}>⚠</span><span style={{ color:C.muted }}>{p}</span>
              </div>
            ))}
          </Card>
          <div style={{ fontSize:12,fontWeight:700,color:C.muted,marginBottom:8,
            textTransform:"uppercase",letterSpacing:1 }}>3 Variações Melhoradas</div>
          {result.variacoes?.map((v,i)=>(
            <Card key={i} style={{ marginBottom:10 }}>
              <div style={{ fontSize:11,color:C.cyan,fontWeight:600,marginBottom:6 }}>
                Variação {i+1} · {v.melhoria}
              </div>
              <div style={{ fontSize:14,fontWeight:600,lineHeight:1.5,marginBottom:10 }}>"{v.texto}"</div>
              <CopyBtn text={v.texto}/>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
};

    setLoading(true); setResult(null);

            flexDirection:"column",alignItems:"center",gap:3,padding:"6px 13px",
            background:"none",border:"none",cursor:"pointer",
            color:page===p.id?C.accent:C.muted,minWidth:60,transition:"color 0.15s" }}>
            <span style={{ fontSize:17 }}>{p.icon}</span>
            <span style={{ fontSize:10,fontWeight:page===p.id?700:400 }}>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
